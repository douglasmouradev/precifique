# Desenvolvimento local — MySQL 8.4 + Redis
# Uso: docker compose up -d
# Configure .env: DB_HOST=127.0.0.1, REDIS_HOST=127.0.0.1

services:
  mysql:
    image: mysql:8.4
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-precifique}
      MYSQL_USER: ${DB_USERNAME:-precifique}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - precifique_mysql:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --mysql-native-password=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - precifique_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  precifique_mysql:
  precifique_redis:
