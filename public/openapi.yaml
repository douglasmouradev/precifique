openapi: 3.0.3
info:
  title: Precifique API
  version: 1.0.0
  description: REST API for Precifique SaaS integrations
servers:
  - url: /api/v1
paths:
  /auth/token:
    post:
      summary: Obtain API token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, device_name]
              properties:
                email: { type: string }
                password: { type: string }
                device_name: { type: string }
                abilities: { type: array, items: { type: string } }
      responses:
        '200': { description: Token issued }
  /dashboard/summary:
    get:
      summary: Dashboard metrics
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
  /products:
    get:
      summary: List products
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
  /sales:
    get:
      summary: List sales
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Create sale
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
