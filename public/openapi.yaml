openapi: 3.0.3
info:
  title: Precifique API
  version: 1.0.0
  description: REST API for Precifique SaaS integrations (multi-tenant pricing & sales).
servers:
  - url: /api/v1
paths:
  /auth/token:
    post:
      summary: Obtain API bearer token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/tokens:
    get:
      summary: List API tokens
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /auth/tokens/{token}:
    delete:
      summary: Revoke API token
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /dashboard/summary:
    get:
      summary: Dashboard metrics summary
      tags: [Dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /products:
    get:
      summary: List products
      tags: [Products]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /products/{product}:
    get:
      summary: Show product
      tags: [Products]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: product
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: Not found }
  /products/{product}/stock:
    patch:
      summary: Update product stock
      tags: [Products]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: product
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                stock_quantity: { type: integer, minimum: 0 }
                min_stock_alert: { type: integer, minimum: 0 }
      responses:
        '200': { description: Updated }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /sales:
    get:
      summary: List sales
      tags: [Sales]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      summary: Create sale
      tags: [Sales]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaleStoreRequest'
      responses:
        '201': { description: Created }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /sales/{sale}:
    get:
      summary: Show sale
      tags: [Sales]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: sale
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: Not found }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token
  schemas:
    TokenRequest:
      type: object
      required: [email, password, device_name]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        device_name: { type: string }
        abilities: { type: array, items: { type: string } }
    TokenResponse:
      type: object
      properties:
        token: { type: string }
        abilities: { type: array, items: { type: string } }
    SaleStoreRequest:
      type: object
      required: [product_id, quantity, unit_price, payment_method]
      properties:
        product_id: { type: integer }
        quantity: { type: integer, minimum: 1 }
        unit_price: { type: number, minimum: 0 }
        payment_method: { type: string, enum: [pix, credito, debito] }
        sold_at: { type: string, format: date-time }
        notes: { type: string }
    Error:
      type: object
      properties:
        message: { type: string }
  responses:
    Unauthorized:
      description: Invalid or missing token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Missing ability or onboarding/LGPD incomplete
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
              errors: { type: object }
